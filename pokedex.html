<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pokedex</title>

<style>
body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.pokedex {
    display: flex;
    background: #e60026;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 40px black;
}

.left, .right {
    width: 260px;
    background: #ff002b;
    border-radius: 15px;
    padding: 10px;
    position: relative;
}

.hinge {
    width: 18px;
    background: linear-gradient(#a0001a, #ff0033, #a0001a);
    border-radius: 10px;
    margin: 0 5px;
}

.top {
    display: flex;
    align-items: center;
    gap: 10px;
}

.lens {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: radial-gradient(circle, #7edbff, #005f99);
    border: 4px solid #ccefff;
    box-shadow: 0 0 15px #00ccff;
}

.lights {
    display: flex;
    gap: 6px;
}

.light {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

.red { background: red; }
.yellow { background: yellow; }
.green { background: lime; }

.screen-frame {
    background: #ddd;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

.screen {
    background: #3cc3ff;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.sprite {
    width: 160px;
}

.jump {
    animation: jump 0.4s;
}

@keyframes jump {
    50% { transform: translateY(-30px); }
}

.input-area {
    margin-top: 10px;
    display: flex;
    gap: 5px;
}

input {
    flex: 1;
    padding: 5px;
}

button {
    padding: 5px;
}

.controls {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.green-btn {
    width: 70px;
    height: 35px;
    background: #4CAF50;
    border-radius: 5px;
}

.dpad {
    width: 50px;
    height: 50px;
    background: #111;
    clip-path: polygon(
        40% 0%, 60% 0%, 60% 40%, 100% 40%, 100% 60%,
        60% 60%, 60% 100%, 40% 100%, 40% 60%,
        0% 60%, 0% 40%, 40% 40%
    );
}

.name {
    background: #3cc3ff;
    padding: 5px;
    text-align: center;
    font-weight: bold;
    border-radius: 5px;
}

.info {
    background: #222;
    color: white;
    margin-top: 10px;
    padding: 8px;
    border-radius: 8px;
    height: 80px;
    overflow-y: auto;
    font-size: 13px;
}

.blue-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 3px;
    margin-top: 10px;
}

.blue-grid div {
    height: 20px;
    background: #3cc3ff;
}

.bottom-buttons {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}

.small-btn {
    flex: 1;
    height: 20px;
    background: #111;
}

.yellow-btn {
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="pokedex">

    <div class="left">
        
        <div class="top">
            <div class="lens"></div>
            <div class="lights">
                <div class="light red"></div>
                <div class="light yellow"></div>
                <div class="light green"></div>
            </div>
        </div>

        <div class="screen-frame">
            <div class="screen">
                <img id="sprite" class="sprite">
            </div>
        </div>

        <div class="input-area">
            <input id="pokemonInput" placeholder="Digite">
            <button onclick="buscarPokemon()">OK</button>
        </div>

        <div class="controls">
            <div></div> 
            <div class="green-btn"></div>
            <div class="dpad"></div>
        </div>

    </div>

    <div class="hinge"></div>

    <div class="right">
        <div class="name" id="nome">---</div>

        <div class="info" id="infoTop"></div>
        <div class="info" id="infoBottom"></div>

        <div class="blue-grid">
            <div></div><div></div><div></div><div></div><div></div><div></div>
        </div>

        <div class="bottom-buttons">
            <div class="small-btn"></div>
            <div class="small-btn"></div>
        </div>

        <div class="yellow-btn"></div>
    </div>

</div>
   
<audio id="cry"></audio>
  
</body>
</html>
